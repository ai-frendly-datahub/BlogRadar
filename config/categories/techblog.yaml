entities:
  - name: "Domain"
    display_name: "기술 도메인"
    keywords:
      - "frontend"
      - "backend"
      - "devops"
      - "infrastructure"
      - "machine learning"
      - "deep learning"
      - "artificial intelligence"
      - "data engineering"
      - "mobile"
      - "security"
      - "distributed systems"
      - "microservices"
      - "kubernetes"
      - "cloud native"

  - name: "Language"
    display_name: "프로그래밍 언어"
    keywords:
      - "python"
      - "golang"
      - "rust"
      - "kotlin"
      - "swift"
      - "typescript"
      - "javascript"
      - "java"
      - "scala"
      - "ruby"

  - name: "Framework"
    display_name: "프레임워크/도구"
    keywords:
      - "react"
      - "next.js"
      - "fastapi"
      - "django"
      - "spring"
      - "pytorch"
      - "tensorflow"
      - "docker"
      - "kafka"
      - "redis"
      - "postgresql"
      - "elasticsearch"
      - "graphql"
      - "grpc"
      - "llm"
      - "rag"
      - "vector database"

  - name: "Topic"
    display_name: "주제"
    keywords:
      - "performance"
      - "scalability"
      - "reliability"
      - "observability"
      - "open source"
      - "api design"
      - "testing"
      - "refactoring"
      - "architecture"
      - "migration"
      - "real-time"
      - "streaming"
      - "대용량"
      - "성능"
      - "아키텍처"
      - "마이그레이션"

  - name: "Company"
    display_name: "기업"
    keywords:
      - "kakao"
      - "naver"
      - "toss"
      - "baemin"
      - "coupang"
      - "daangn"
      - "google"
      - "meta"
      - "netflix"
      - "airbnb"
      - "uber"
      - "stripe"
      - "shopify"
